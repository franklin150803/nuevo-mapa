        #map { height: 100vh; width: 100%; }
        .leaflet-routing-container { display: none !important; }
        
        /* Panel con scroll para soportar muchas rutas */
        .control-panel {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);

        }
        .control-panel h3 { margin-top: 0; font-size: 16px; border-bottom: 2px solid #333; padding-bottom: 5px;}
        .route-toggle { margin-bottom: 12px; display: flex; align-items: center; font-size: 13px; font-weight: bold;}
        .route-toggle input { margin-right: 10px; cursor: pointer; width: 16px; height: 16px; }
        .color-box { width: 15px; height: 15px; display: inline-block; margin-right: 10px; border: 1px solid #333; border-radius: 3px;}
        .legend { font-size: 11px; color: #555; margin-top: 15px; border-top: 1px solid #ccc; padding-top: 5px;}

        // --- FIN DEL BLOQUE DE DATOS ---

        // Función de inicialización: Crea la interfaz leyendo los datos
        function inicializarUI() {
            const contenedor = document.getElementById('lista-rutas');
            for (const [id, datos] of Object.entries(rutasData)) {
                contenedor.innerHTML += `
                    <div class="route-toggle">
                        <input type="checkbox" id="${id}" onchange="toggleRuta('${id}')">
                        <span class="color-box" style="background: ${datos.color};"></span> ${datos.nombre}
                    </div>
                `;
            }
        }

        // Lógica del motor de enrutamiento
        function toggleRuta(idRuta) {
            const checkbox = document.getElementById(idRuta);
            const datos = rutasData[idRuta];
            const configBase = { routeWhileDragging: false, addWaypoints: false, fitSelectedRoutes: false, createMarker: () => null };

            if (checkbox.checked) {
                const trazoIda = L.Routing.control({
                    waypoints: datos.ida, ...configBase,
                    lineOptions: { styles: [{ color: datos.color, opacity: 0.9, weight: 6 }] }
                }).addTo(map);

                const trazoVuelta = L.Routing.control({
                    waypoints: datos.vuelta, ...configBase,
                    lineOptions: { styles: [{ color: datos.color, opacity: 0.9, weight: 6, dashArray: '8, 12' }] }
                }).addTo(map);

                datos.instancias = [trazoIda, trazoVuelta];
            } else {
                datos.instancias.forEach(instancia => map.removeControl(instancia));
                datos.instancias = [];
            }
        }

        // Ejecutar al cargar
        if(typeof rutasData !== 'undefined') {
            inicializarUI();
        } else {
            console.warn("Falta insertar el bloque de datos rutasData");
        }
