<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Estructural de Transporte - Lima y Callao</title>

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: -apple-system, 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; }

        /* ==================================================================
           SISTEMA VISUAL: Glassmorfismo (paneles) + Liquid Glass (botones e
           interacciones) + UI Espacial (todo anclado por capas de profundidad,
           nada centrado en cajas rígidas).
        ================================================================== */

        /* ---------- Botón hamburguesa (glass) ---------- */
        .hamburger-btn {
            position: fixed; top: 15px; right: 15px; z-index: 9999;
            width: 48px; height: 48px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(20, 24, 34, 0.45);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            box-shadow: 0 8px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 5px; padding: 0;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s, box-shadow 0.3s;
            pointer-events: auto;
            animation: aparecerBoton 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes aparecerBoton {
            from { opacity: 0; transform: scale(0.6) rotate(-15deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .hamburger-btn:hover {
            background: rgba(28, 34, 48, 0.6);
            box-shadow: 0 10px 30px rgba(41,121,255,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
            transform: scale(1.06);
        }
        .hamburger-btn:active { transform: scale(0.92); background: rgba(20, 24, 34, 0.65); }
        .hamburger-btn span {
            display: block; width: 20px; height: 2px; background: #f2f5fa;
            border-radius: 2px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s;
        }
        .hamburger-btn.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger-btn.active span:nth-child(2) { opacity: 0; }
        .hamburger-btn.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* ---------- Overlay (fondo oscuro al abrir el menú) ---------- */
        .overlay {
            position: fixed; inset: 0; background: rgba(5, 8, 14, 0.45);
            backdrop-filter: blur(2px);
            z-index: 9990; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay.visible { opacity: 1; pointer-events: auto; }

        /* ---------- Panel lateral (drawer, glass) ---------- */
        .control-panel {
            position: fixed; top: 0; right: 0; height: 100%; z-index: 9995;
            background: rgba(16, 20, 30, 0.62);
            backdrop-filter: blur(19px) saturate(140%);
            -webkit-backdrop-filter: blur(19px) saturate(140%);
            border-left: 1px solid rgba(255,255,255,0.12);
            padding: 70px 15px 15px 15px;
            box-shadow: -8px 0 32px rgba(0,0,0,0.45);
            width: 280px; max-width: 82vw; overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
            color: #eef1f7;
        }
        .control-panel.open { transform: translateX(0); }
        /* Mientras se arrastra con el dedo, sin animación (se sigue el dedo en tiempo real) */
        .control-panel.dragging { transition: none; }

        .control-panel h3 {
            margin-top: 0; font-size: 16px; font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 10px;
            color: #f5f7fb; letter-spacing: 0.2px;
        }

        /* ---------- Acordeón de departamentos (glass, capas de profundidad) ---------- */
        .distrito-bloque {
            margin-bottom: 8px; border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.03);
            transition: border-color 0.3s, background 0.3s;
        }
        /* Departamento con al menos una ruta activa: se resalta para que destaque
           entre los demás bloques del acordeón (antes todos se veían idénticos) */
        .distrito-bloque.tiene-activa {
            border-color: rgba(41,121,255,0.45);
            background: rgba(41,121,255,0.06);
        }

        .distrito-header {
            width: 100%; display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.05); border: none; padding: 12px 14px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: #dfe4ee; text-transform: uppercase;
            letter-spacing: 0.4px;
            text-align: left; transition: background 0.2s;
        }
        .distrito-header:active { background: rgba(255,255,255,0.1); }
        .distrito-bloque.tiene-activa .distrito-header { color: #fff; }
        .distrito-bloque.tiene-activa .distrito-header::before {
            content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background: #2979FF; box-shadow: 0 0 6px #2979FF; margin-right: 8px;
        }
        .distrito-header .chevron {
            font-size: 12px; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); color: #9aa7bd; margin-left: 8px;
        }
        .distrito-header.abierto .chevron { transform: rotate(180deg); }

        .distrito-content {
            max-height: 0; overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 12px;
        }
        .distrito-content.abierto { padding: 10px 12px; }

        .route-toggle {
            margin-bottom: 10px; display: flex; align-items: center; font-size: 13px;
            font-weight: 500; color: #d3dae8;
        }
        .route-toggle input { margin-right: 10px; cursor: pointer; width: 16px; height: 16px; accent-color: #2979FF; }
        .color-box { width: 13px; height: 13px; display: inline-block; margin-right: 10px; border-radius: 4px; box-shadow: 0 0 6px rgba(0,0,0,0.4);}
        .legend { font-size: 11px; color: #9aa7bd; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.12); padding-top: 8px;}

        /* ---------- Selector de tema Día / Noche (liquid glass) ---------- */
        .theme-toggle { margin-top: 18px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.12); }
        .theme-toggle-label { font-size: 12px; font-weight: 600; color: #cfd6e4; margin-bottom: 8px; }
        .theme-toggle-buttons {
            display: flex; gap: 6px; padding: 4px;
            background: rgba(0,0,0,0.25); border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .theme-btn {
            flex: 1; padding: 9px 6px; border-radius: 10px; border: none;
            background: transparent; color: #aab4c6; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .theme-btn:active { transform: scale(0.94); }
        .theme-btn.activo {
            background: linear-gradient(135deg, rgba(120,150,255,0.35), rgba(255,255,255,0.12));
            color: #fff; box-shadow: 0 4px 14px rgba(41,121,255,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        /* Zona invisible en el borde derecho de la pantalla para iniciar el gesto de "jalar" y abrir el menú */
        .edge-swipe-zone {
            position: fixed; top: 0; right: 0; width: 24px; height: 100%;
            z-index: 9980; touch-action: none;
        }

        /* ---------- Ítem de ruta en el menú (ya no checkbox, ahora abre tarjeta) ---------- */
        .route-item {
            margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
            font-size: 13px; font-weight: 500; color: #d3dae8;
            padding: 9px 10px; border-radius: 10px; cursor: pointer;
            background: rgba(255,255,255,0.02); border: 1px solid transparent;
            transition: background 0.2s, border-color 0.2s;
        }
        .route-item:active { background: rgba(255,255,255,0.08); }
        .route-item.activa { background: rgba(41,121,255,0.12); border-color: rgba(41,121,255,0.35); color: #fff; }

        /* ---------- Tarjeta flotante de Empresa (glass + liquid glass), estilo UI espacial:
           anclada abajo-centro, flotando sobre el mapa, independiente del menú lateral. ---------- */
        .empresa-card {
            position: fixed; left: 50%; bottom: 22px; z-index: 9997;
            width: min(92vw, 380px);
            transform: translateX(-50%) translateY(140%);
            opacity: 0;
            background: rgba(16, 20, 30, 0.6);
            backdrop-filter: blur(26px) saturate(160%);
            -webkit-backdrop-filter: blur(26px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 20px;
            padding: 16px 16px 14px;
            box-shadow: 0 16px 45px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s;
            pointer-events: none;
        }
        .empresa-card.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .empresa-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
        .empresa-card-nombre { font-size: 14px; font-weight: 700; color: #f5f7fb; line-height: 1.3; }
        .empresa-card-ruta { font-size: 12px; color: #9aa7bd; margin-top: 2px; }
        .empresa-card-distancia { font-size: 12px; color: #7d9bc4; margin-top: 4px; font-weight: 600; }
        .empresa-card-cerrar {
            flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.08); color: #cfd6e4; font-size: 15px; line-height: 1;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
        }
        .empresa-card-cerrar:active { transform: scale(0.85) rotate(90deg); background: rgba(255,255,255,0.18); }

        .empresa-card-botones { display: flex; gap: 10px; }
        .direccion-btn {
            flex: 1; padding: 13px 8px; border-radius: 14px; border: 1.5px solid;
            background: rgba(255,255,255,0.04); font-size: 13px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s, box-shadow 0.3s;
        }
        .direccion-btn:active { transform: scale(0.94); }
        .direccion-btn .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

        .direccion-btn.ida { border-color: rgba(41,121,255,0.4); color: #a9c6ff; }
        .direccion-btn.ida .dot { background: #2979FF; box-shadow: 0 0 8px #2979FF; }
        .direccion-btn.ida.activo {
            background: linear-gradient(135deg, rgba(41,121,255,0.4), rgba(41,121,255,0.15));
            color: #fff; box-shadow: 0 6px 18px rgba(41,121,255,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            border-color: rgba(41,121,255,0.8);
        }

        .direccion-btn.vuelta { border-color: rgba(255,59,48,0.4); color: #ffb3ad; }
        .direccion-btn.vuelta .dot { background: #FF3B30; box-shadow: 0 0 8px #FF3B30; }
        .direccion-btn.vuelta.activo {
            background: linear-gradient(135deg, rgba(255,59,48,0.4), rgba(255,59,48,0.15));
            color: #fff; box-shadow: 0 6px 18px rgba(255,59,48,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
            border-color: rgba(255,59,48,0.8);
        }
    </style>
</head>
<body>

    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Abrir menú de rutas">
        <span></span><span></span><span></span>
    </button>

    <div class="overlay" id="overlay"></div>
    <div class="edge-swipe-zone" id="edgeSwipeZone"></div>

    <div class="control-panel" id="controlPanel">
        <h3>📍 Rutas de Transporte</h3>

        <div id="lista-rutas"></div>

        <div class="legend">
            <span style="color:#2979FF;">●</span> <b>Azul</b> = Ida &nbsp;&nbsp;
            <span style="color:#FF3B30;">●</span> <b>Rojo</b> = Vuelta<br>
            Toca una empresa para elegir el sentido
        </div>

        <div class="theme-toggle">
            <div class="theme-toggle-label">🎨 Estilo del mapa</div>
            <div class="theme-toggle-buttons">
                <button type="button" id="btnTemaDia" class="theme-btn" onclick="cambiarTema('day')">☀️ Día</button>
                <button type="button" id="btnTemaNoche" class="theme-btn activo" onclick="cambiarTema('night')">🌙 Noche</button>
            </div>
        </div>
    </div>

    <!-- Tarjeta flotante: aparece al tocar una empresa. Muestra su nombre y
         2 botones (Ida / Vuelta) para elegir qué sentido dibujar en el mapa. -->
    <div class="empresa-card" id="empresaCard">
        <div class="empresa-card-header">
            <div>
                <div class="empresa-card-nombre" id="empresaCardNombre">—</div>
                <div class="empresa-card-ruta" id="empresaCardRuta"></div>
                <div class="empresa-card-distancia" id="empresaCardDistancia"></div>
            </div>
            <button type="button" class="empresa-card-cerrar" id="empresaCardCerrar" aria-label="Cerrar">✕</button>
        </div>
        <div class="empresa-card-botones">
            <button type="button" class="direccion-btn ida" id="btnDireccionIda">
                <span class="dot"></span> Ida
            </button>
            <button type="button" class="direccion-btn vuelta" id="btnDireccionVuelta">
                <span class="dot"></span> Vuelta
            </button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <!-- Datos de rutas por distrito (cada distrito en su propio archivo) -->
    <script src="rutas-callao.js"></script>
    <script src="rutas-lima.js"></script>
    <script src="rutas-arequipa.js"></script>
    <script src="rutas-trujillo.js"></script>
    <script src="rutas-cusco.js"></script>
    <script src="rutas-piura.js"></script>
    <script src="rutas-chiclayo.js"></script>
    <script src="rutas-iquitos.js"></script>
    <script src="rutas-huanuco.js"></script>
    <script src="rutas-ucayali.js"></script>
    <script src="rutas-madrededios.js"></script>
    <script src="rutas-tacna.js"></script>
    <script src="rutas-moquegua.js"></script>
    <script src="rutas-puno.js"></script>
    <script src="rutas-apurimac.js"></script>
    <script src="rutas-ayacucho.js"></script>
    <script src="rutas-ica.js"></script>
    <script src="rutas-huancavelica.js"></script>
    <script src="rutas-junin.js"></script>
    <script src="rutas-pasco.js"></script>
    <script src="rutas-ancash.js"></script>
    <script src="rutas-sanmartin.js"></script>
    <script src="rutas-amazonas.js"></script>
    <script src="rutas-cajamarca.js"></script>
    <script src="rutas-tumbes.js"></script>

    <script>
        // ------------------------------------------------------------------
        // OPTIMIZACIÓN DE RENDIMIENTO: limitamos la resolución de renderizado
        // a 1x en vez de la densidad de píxeles real del dispositivo (2x o 3x
        // en celulares). Esto reduce drásticamente la carga de la GPU (hasta
        // 4-9 veces menos píxeles que sombrear por frame) con una pérdida de
        // nitidez casi imperceptible. Debe ejecutarse ANTES de crear el mapa.
        // ------------------------------------------------------------------
        Object.defineProperty(window, 'devicePixelRatio', { get: () => 1 });

        // ------------------------------------------------------------------
        // TEMAS DEL MAPA: Día (claro) y Noche (oscuro, estilo "Dark Matter").
        // Ambos son estilos gratuitos de OpenFreeMap, sin API key.
        // ------------------------------------------------------------------
        const ESTILOS_MAPA = {
            day: 'https://tiles.openfreemap.org/styles/liberty',
            night: 'https://tiles.openfreemap.org/styles/dark'
        };
        // Colores de las rutas según sentido (independiente del color propio de cada línea/corredor)
        const COLOR_IDA = '#2979FF';    // Azul
        const COLOR_VUELTA = '#FF3B30'; // Rojo

        let temaActual = 'night'; // Arranca en modo noche (estilo oscuro solicitado)

        // Mapa base en MapLibre GL (WebGL, 3D real: pitch + edificios extruidos).
        // Ya NO usamos Leaflet: todo (terreno, edificios y rutas) vive en la
        // misma escena, así que al inclinar o rotar la cámara, las rutas se
        // mueven exactamente junto con el mapa. Estilo libre, sin API key.
        const map = new maplibregl.Map({
            container: 'map',
            style: ESTILOS_MAPA[temaActual],
            center: [-77.080, -12.050], // MapLibre usa [lng, lat]
            zoom: 12,
            pitch: 45,
            bearing: -12,
            maxPitch: 60,
            antialias: false,       // el mayor ahorro de GPU; el detalle perdido no se nota
            fadeDuration: 0,        // sin crossfade de teselas al hacer zoom (menos trabajo por frame)
            renderWorldCopies: false
        });

        map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-left');

        // Evita el spam de consola "Image X could not be loaded" y los cuadros
        // rotos de íconos POI que no existen en el sprite del estilo (ocurre
        // sobre todo en modo Día con "liberty"): se registra una imagen vacía
        // de 1x1 transparente para cualquier ícono que el estilo pida y no
        // encuentre, así el símbolo simplemente no se dibuja en vez de romperse.
        map.on('styleimagemissing', (e) => {
            if (map.hasImage(e.id)) return;
            const lienzo = { width: 1, height: 1, data: new Uint8Array(4) };
            map.addImage(e.id, lienzo);
        });

        // Repinta el tema Noche con colores reales (agua azul oscuro, parques/bosque
        // verde oscuro, vías claras y bien visibles, edificios azulados) en vez del
        // gris/negro plano del estilo "dark" original de OpenFreeMap. También corrige
        // las pistas del aeropuerto, que en el estilo original se ven como rectángulos
        // negros sólidos y desentonan con el fondo azul oscuro.
        //
        // Además aplica una JERARQUÍA VIAL real (autopista > avenida > calle > calle
        // interna) tanto en color como en ancho: en el estilo "dark" original, el
        // ancho de "highway_minor" (calles) reutiliza literalmente la misma curva de
        // una capa de pistas de aeropuerto, por lo que a cierto zoom las calles se
        // veían tan gruesas como las avenidas principales. Aquí se le da a cada nivel
        // su propia curva de ancho, bien diferenciada.
        //
        // Se aplica con setPaintProperty/setLayoutProperty porque es más liviano
        // que clonar y reemplazar todo el JSON del estilo.
        function personalizarTemaNoche() {
            const paints = {
                // --- Terreno, agua y vegetación ---
                'background':          { 'background-color': '#0a1420' },      // azul muy oscuro (no negro puro)
                'water':                { 'fill-color': '#0d2b46' },            // agua azul oscuro
                'waterway':             { 'line-color': '#0d2b46' },
                'landcover_wood':       { 'fill-color': '#16281c' },            // bosque verde oscuro
                'landuse_park':         { 'fill-color': '#183a24' },            // parques verde oscuro
                'landuse_residential':  { 'fill-color': '#141a22' },            // zonas urbanas, azulado muy sutil
                'building':             { 'fill-color': '#151b25', 'fill-outline-color': '#22303f' },
                'landcover_ice_shelf':  { 'fill-color': '#0a1420' },
                'landcover_glacier':    { 'fill-color': '#0a1420' },

                // --- Pistas y calles de rodaje del aeropuerto: en el estilo original
                // se pintan negro sólido y se ven como manchas oscuras encima del
                // fondo azulado; las hacemos transparentes/sutiles ---
                'aeroway-area':         { 'fill-opacity': 0 },
                'aeroway-runway':       { 'line-color': '#2a3446', 'line-opacity': 0.6 },
                'aeroway-taxiway':      { 'line-color': '#22303f' },
                'aeroway-runway-casing':{ 'line-color': 'rgba(90,110,135,0.6)' },

                // --- JERARQUÍA VIAL: color ---
                // Autopistas: el tono más claro/prominente de todos (el "#D4E2F2" que
                // pediste, en vez de blanco puro). Avenidas: un peldaño más abajo.
                // Calles: notablemente más discretas. Calles internas/peatonales: casi mudas.
                'highway_motorway_inner': { 'line-color': '#D4E2F2' },
                'highway_motorway_casing':{ 'line-color': 'rgba(8,12,20,0.55)' },
                'highway_motorway_subtle':{ 'line-color': '#4a5b76' },
                'highway_major_inner':    { 'line-color': '#9fb2cc' },
                'highway_major_casing':   { 'line-color': 'rgba(8,12,20,0.4)' },
                'highway_major_subtle':   { 'line-color': '#3a4a63' },
                'highway_minor':          { 'line-color': '#3a4658', 'line-opacity': 0.85 },
                'highway_path':           { 'line-color': '#22303f' },
                'railway':                { 'line-color': '#3a4a63', 'line-opacity': 0.7 },
                'railway_minor':          { 'line-color': '#324158', 'line-opacity': 0.7 },
                'railway_transit':        { 'line-color': '#324158', 'line-opacity': 0.7 },

                // --- Etiquetas: más legibles sobre el fondo oscuro ---
                'highway_name_other':    { 'text-color': '#b9c6da' },
                'highway_name_motorway': { 'text-color': '#d7e1f0' },
                'place_other':    { 'text-color': '#c3cee0' },
                'place_suburb':   { 'text-color': '#c3cee0' },
                'place_village':  { 'text-color': '#c3cee0' },
                'place_town':     { 'text-color': '#d3dcea' },
                'place_city':     { 'text-color': '#e2e8f2' },
                'place_city_large': { 'text-color': '#e2e8f2' },
                'place_state':    { 'text-color': '#c3cee0' },
                'water_name':     { 'text-color': '#4f7fa6' }
            };
            for (const [idCapa, propiedades] of Object.entries(paints)) {
                if (!map.getLayer(idCapa)) continue;
                for (const [propiedad, valor] of Object.entries(propiedades)) {
                    try { map.setPaintProperty(idCapa, propiedad, valor); } catch (e) { /* la capa no tiene esa propiedad, se ignora */ }
                }
            }

            // --- JERARQUÍA VIAL: ancho (curvas propias por nivel, ya no comparten curva) ---
            const anchos = {
                'highway_motorway_inner':  ['interpolate', ['exponential', 1.4], ['zoom'], 5, 1.5, 10, 3, 14, 6.5, 18, 14],
                'highway_motorway_casing': ['interpolate', ['exponential', 1.4], ['zoom'], 5, 3, 10, 5.5, 14, 10, 18, 19],
                'highway_major_inner':     ['interpolate', ['exponential', 1.3], ['zoom'], 10, 1, 13, 2.5, 16, 5, 20, 9],
                'highway_major_casing':    ['interpolate', ['exponential', 1.3], ['zoom'], 10, 2.2, 13, 4.2, 16, 7.5, 20, 13],
                'highway_minor':           ['interpolate', ['exponential', 1.4], ['zoom'], 13, 0.4, 16, 1.2, 18, 2.2, 20, 3.5],
                'highway_path':            ['interpolate', ['exponential', 1.2], ['zoom'], 13, 0.5, 18, 2]
            };
            for (const [idCapa, expresion] of Object.entries(anchos)) {
                if (!map.getLayer(idCapa)) continue;
                try { map.setPaintProperty(idCapa, 'line-width', expresion); } catch (e) { /* ignorar */ }
            }

            // --- GLORIETAS: el estilo original usa "line-join: miter" en las capas de
            // "casing" (contorno) de avenidas y autopistas. En curvas cerradas (como
            // una glorieta), un miter join genera una punta/mancha que se ve enorme.
            // Cambiarlo a "round" resuelve el problema sin tocar los datos. ---
            ['highway_major_casing', 'highway_motorway_casing'].forEach(idCapa => {
                if (!map.getLayer(idCapa)) return;
                try { map.setLayoutProperty(idCapa, 'line-join', 'round'); } catch (e) { /* ignorar */ }
            });
        }

        // Brillo/resplandor sutil a lo largo de la costa: el estilo original solo
        // rellena el agua (fill), sin ningún trazo en el borde, por eso la línea
        // costa/tierra se sentía muy dura. Se agrega un trazo fino y difuminado
        // (line-blur) justo en el contorno del polígono de agua.
        function agregarBrilloCosta() {
            try {
                if (map.getLayer('costa-brillo')) return;
                map.addLayer({
                    id: 'costa-brillo',
                    type: 'line',
                    source: 'openmaptiles',
                    'source-layer': 'water',
                    filter: ['all', ['match', ['geometry-type'], ['MultiPolygon', 'Polygon'], true, false], ['!=', ['get', 'brunnel'], 'tunnel']],
                    paint: {
                        'line-color': '#2f6690',
                        'line-width': ['interpolate', ['linear'], ['zoom'], 5, 0.6, 14, 2.5],
                        'line-blur': 1.2,
                        'line-opacity': 0.75
                    }
                });
            } catch (e) {
                console.warn('No se pudo agregar el brillo de costa:', e);
            }
        }

        // Cielo/atmósfera + luz direccional real: esto es lo que le da volumen de
        // verdad a los edificios extruidos (sombreado en sus caras según de dónde
        // "viene" la luz), en vez de que se vean como un plano inclinado con cajas
        // planas encima.
        function agregarProfundidad() {
            map.setLight({
                anchor: 'viewport',
                color: '#ffffff',
                intensity: temaActual === 'night' ? 0.4 : 0.55,
                position: [1.5, 90, 55]
            });
            try {
                if (map.getLayer('cielo')) return;
                map.addLayer({
                    id: 'cielo',
                    type: 'sky',
                    paint: {
                        'sky-type': 'atmosphere',
                        'sky-atmosphere-sun': [0, 90],
                        'sky-atmosphere-sun-intensity': temaActual === 'night' ? 3 : 10,
                        'sky-atmosphere-color': temaActual === 'night' ? '#0a1420' : '#bfe3ff',
                        'sky-atmosphere-halo-color': temaActual === 'night' ? '#0a1420' : '#ffffff'
                    }
                });
            } catch (e) {
                console.warn('No se pudo agregar la capa de cielo:', e);
            }
        }

        // Agrega la capa de edificios 3D (se debe volver a llamar cada vez que
        // cambia el estilo del mapa, ya que setStyle() borra todas las capas propias).
        // 'fill-extrusion-vertical-gradient' + la luz de agregarProfundidad() dan
        // sombreado real cara por cara, en vez de un color plano sin volumen.
        function agregarEdificios3D() {
            try {
                if (map.getLayer('edificios-3d')) return; // ya existe, no duplicar
                const capas = map.getStyle().layers;
                let idCapaEtiquetas;
                for (const capa of capas) {
                    if (capa.type === 'symbol') { idCapaEtiquetas = capa.id; break; }
                }
                // Tono más claro y con más contraste contra el fondo oscuro (antes
                // "#324158" se perdía casi contra el terreno "#0a1420"; ahora resalta).
                const colorEdificio = temaActual === 'night' ? '#54688a' : '#b8b8b8';
                map.addLayer({
                    id: 'edificios-3d',
                    source: 'openmaptiles',
                    'source-layer': 'building',
                    type: 'fill-extrusion',
                    minzoom: 15, // un poco más restrictivo: menos geometría 3D activa a la vez
                    paint: {
                        'fill-extrusion-color': colorEdificio,
                        'fill-extrusion-height': ['coalesce', ['get', 'render_height'], 8],
                        'fill-extrusion-base': ['coalesce', ['get', 'render_min_height'], 0],
                        'fill-extrusion-opacity': temaActual === 'night' ? 0.9 : 0.85,
                        'fill-extrusion-vertical-gradient': true
                    }
                }, idCapaEtiquetas);
            } catch (e) {
                console.warn('No se pudo agregar la capa de edificios 3D:', e);
            }
        }

        // Vuelve a dibujar las rutas que ya estaban activas (usando su caché de
        // coordenadas) después de un cambio de tema, ya que setStyle() destruye
        // todas las fuentes y capas del estilo anterior.
        function reaplicarRutasActivas() {
            for (const distrito in distritosData) {
                for (const idRuta in distritosData[distrito]) {
                    const datos = distritosData[distrito][idRuta];
                    if (!datos._direccionActiva) continue;
                    const sufijo = datos._direccionActiva;
                    const cacheKey = sufijo === 'ida' ? '_cacheIda' : '_cacheVuelta';
                    if (!datos[cacheKey]) continue;
                    datos.instancias = [`ruta-${idRuta}-${sufijo}`];
                    dibujarCapaLinea(`ruta-${idRuta}-${sufijo}`, datos[cacheKey], sufijo);
                }
            }
        }

        // 'style.load' se dispara con la carga inicial Y cada vez que se llama a
        // map.setStyle(), a diferencia de 'load' que solo ocurre una vez.
        map.on('style.load', () => {
            if (temaActual === 'night') {
                personalizarTemaNoche();
                agregarBrilloCosta();
            }
            agregarProfundidad();
            agregarEdificios3D();
            reaplicarRutasActivas();
        });

        // Cambia entre el tema Día y Noche
        function cambiarTema(tema) {
            if (tema === temaActual) return;
            temaActual = tema;
            document.getElementById('btnTemaDia').classList.toggle('activo', tema === 'day');
            document.getElementById('btnTemaNoche').classList.toggle('activo', tema === 'night');
            map.setStyle(ESTILOS_MAPA[tema]);
        }

        // ------------------------------------------------------------------
        // Registro central de departamentos/distritos. Para agregar uno nuevo:
        // 1. Crea su archivo rutas-<nombre>.js con su propia variable (ej. rutasSJL)
        // 2. Agrega un <script src="rutas-<nombre>.js"> arriba
        // 3. Agrega una entrada aquí: "Nombre a mostrar": variableDeRutas
        // ------------------------------------------------------------------
        const distritosData = {
            "Callao": (typeof rutasData !== 'undefined') ? rutasData : {},
            "Lima": (typeof rutasLima !== 'undefined') ? rutasLima : {},
            "Arequipa": (typeof rutasArequipa !== 'undefined') ? rutasArequipa : {},
            "La Libertad": (typeof rutasTrujillo !== 'undefined') ? rutasTrujillo : {},
            "Cusco": (typeof rutasCusco !== 'undefined') ? rutasCusco : {},
            "Piura": (typeof rutasPiura !== 'undefined') ? rutasPiura : {},
            "Lambayeque": (typeof rutasChiclayo !== 'undefined') ? rutasChiclayo : {},
            "Loreto": (typeof rutasIquitos !== 'undefined') ? rutasIquitos : {},
            "Huánuco": (typeof rutasHuanuco !== 'undefined') ? rutasHuanuco : {},
            "Ucayali": (typeof rutasUcayali !== 'undefined') ? rutasUcayali : {},
            "Madre de Dios": (typeof rutasMadreDeDios !== 'undefined') ? rutasMadreDeDios : {},
            "Tacna": (typeof rutasTacna !== 'undefined') ? rutasTacna : {},
            "Moquegua": (typeof rutasMoquegua !== 'undefined') ? rutasMoquegua : {},
            "Puno": (typeof rutasPuno !== 'undefined') ? rutasPuno : {},
            "Apurímac": (typeof rutasApurimac !== 'undefined') ? rutasApurimac : {},
            "Ayacucho": (typeof rutasAyacucho !== 'undefined') ? rutasAyacucho : {},
            "Ica": (typeof rutasIca !== 'undefined') ? rutasIca : {},
            "Huancavelica": (typeof rutasHuancavelica !== 'undefined') ? rutasHuancavelica : {},
            "Junín": (typeof rutasJunin !== 'undefined') ? rutasJunin : {},
            "Pasco": (typeof rutasPasco !== 'undefined') ? rutasPasco : {},
            "Áncash": (typeof rutasAncash !== 'undefined') ? rutasAncash : {},
            "San Martín": (typeof rutasSanMartin !== 'undefined') ? rutasSanMartin : {},
            "Amazonas": (typeof rutasAmazonas !== 'undefined') ? rutasAmazonas : {},
            "Cajamarca": (typeof rutasCajamarca !== 'undefined') ? rutasCajamarca : {},
            "Tumbes": (typeof rutasTumbes !== 'undefined') ? rutasTumbes : {}
        };

        // Busca una ruta por su id en cualquiera de los departamentos registrados
        function buscarRuta(idRuta) {
            for (const distrito in distritosData) {
                if (distritosData[distrito][idRuta]) {
                    return distritosData[distrito][idRuta];
                }
            }
            return null;
        }

        // Genera un id de HTML seguro a partir del nombre del departamento (sin tildes ni espacios)
        function idSeguro(nombre) {
            return nombre.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '-');
        }

        // Función de inicialización: Crea el menú tipo acordeón, un bloque por departamento
        function inicializarUI() {
            const contenedor = document.getElementById('lista-rutas');
            let html = '';

            for (const [distrito, rutas] of Object.entries(distritosData)) {
                const ids = Object.keys(rutas);
                if (ids.length === 0) continue;

                const distritoId = idSeguro(distrito);

                html += `
                    <div class="distrito-bloque" id="bloque-${distritoId}">
                        <button type="button" class="distrito-header" id="header-${distritoId}" onclick="toggleDistrito('${distritoId}')">
                            <span>${distrito} (${ids.length})</span>
                            <span class="chevron">▼</span>
                        </button>
                        <div class="distrito-content" id="content-${distritoId}">
                `;

                for (const [id, datos] of Object.entries(rutas)) {
                    html += `
                        <div class="route-item" id="item-${id}" data-distrito="${distritoId}" onclick="abrirTarjetaEmpresa('${id}')">
                            <span class="color-box" style="background: ${datos.color};"></span> ${datos.nombre}
                        </div>
                    `;
                }

                html += `</div></div>`;
            }

            contenedor.innerHTML = html;
        }

        // Abre/cierra el submenú de un departamento (acordeón)
        function toggleDistrito(distritoId) {
            const header = document.getElementById(`header-${distritoId}`);
            const content = document.getElementById(`content-${distritoId}`);
            const estabaAbierto = content.classList.contains('abierto');

            if (estabaAbierto) {
                content.style.maxHeight = '0px';
                content.classList.remove('abierto');
                header.classList.remove('abierto');
            } else {
                content.classList.add('abierto');
                header.classList.add('abierto');
                content.style.maxHeight = content.scrollHeight + 'px';
            }
        }

        // Resalta en el acordeón el/los departamento(s) que tienen alguna ruta
        // activa en este momento (antes todos los bloques se veían idénticos,
        // sin ninguna jerarquía visual).
        function actualizarEstadoDistritos() {
            document.querySelectorAll('.distrito-bloque').forEach(b => b.classList.remove('tiene-activa'));
            for (const distrito in distritosData) {
                const distritoId = idSeguro(distrito);
                const tieneActiva = Object.values(distritosData[distrito]).some(d => d._direccionActiva);
                if (tieneActiva) {
                    const bloque = document.getElementById(`bloque-${distritoId}`);
                    if (bloque) bloque.classList.add('tiene-activa');
                }
            }
        }

        // Dibuja un tramo (ida o vuelta) como CAPA NATIVA de MapLibre (GeoJSON + line layer).
        // Al vivir dentro de la misma escena WebGL que el mapa y los edificios 3D,
        // la ruta se inclina/rota/escala en perfecta sincronía con la cámara.
        //
        // El trazado callejero se pide directo al servidor público de OSRM (fetch).
        // Si falla (sin red, sin cobertura vial, CORS, etc.) se cae automáticamente
        // a una línea recta entre los waypoints para que SIEMPRE se vea algo.
        // Dibuja (o re-dibuja) una capa de línea ya con coordenadas resueltas.
        // Separado de crearTramoGL para poder reutilizar la caché de coordenadas
        // cuando cambia el tema del mapa (día/noche), sin tener que volver a
        // pedir la ruta al servidor OSRM.
        function dibujarCapaLinea(idCapa, coords, sufijo) {
            // Por si ya existía (evita error "layer already exists")
            if (map.getLayer(idCapa)) map.removeLayer(idCapa);
            if (map.getSource(idCapa)) map.removeSource(idCapa);

            map.addSource(idCapa, {
                type: 'geojson',
                data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords }, properties: {} }
            });

            // Ida siempre en azul, vuelta siempre en rojo (independiente del
            // color propio asignado a cada corredor/línea en el menú lateral).
            // Se dibuja UNA sola dirección a la vez, línea continua y gruesa
            // para que sea muy notoria (ya no se combinan ida+vuelta juntas).
            const colorLinea = sufijo === 'ida' ? COLOR_IDA : COLOR_VUELTA;

            map.addLayer({
                id: idCapa,
                type: 'line',
                source: idCapa,
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: {
                    'line-color': colorLinea,
                    'line-width': 7,
                    'line-opacity': 0.95
                }
            });
        }

        async function crearTramoGL(datos, idRuta, sufijo, waypointsRaw) {
            const idCapa = `ruta-${idRuta}-${sufijo}`;
            const cacheKey = sufijo === 'ida' ? '_cacheIda' : '_cacheVuelta';
            let coords = datos[cacheKey];

            if (!coords) {
                try {
                    const coordStr = waypointsRaw.map(p => `${p[1]},${p[0]}`).join(';');
                    const url = `https://router.project-osrm.org/route/v1/driving/${coordStr}?overview=full&geometries=geojson`;
                    const resp = await fetch(url);
                    const data = await resp.json();
                    if (data.code === 'Ok' && data.routes && data.routes[0]) {
                        coords = data.routes[0].geometry.coordinates;
                    } else {
                        throw new Error('OSRM no encontró ruta');
                    }
                } catch (e) {
                    coords = waypointsRaw.map(p => [p[1], p[0]]); // fallback: línea recta [lng, lat]
                }
                datos[cacheKey] = coords; // cachea para reusar tras un cambio de tema
            }

            dibujarCapaLinea(idCapa, coords, sufijo);
            datos.instancias.push(idCapa);
        }

        function limpiarInstancias(datos) {
            datos.instancias.forEach(idCapa => {
                if (map.getLayer(idCapa)) map.removeLayer(idCapa);
                if (map.getSource(idCapa)) map.removeSource(idCapa);
            });
            datos.instancias = [];
        }

        // ==================================================================
        // TARJETA DE EMPRESA: al tocar una ruta en el menú se abre esta tarjeta
        // flotante con 2 botones (Ida / Vuelta). Solo se dibuja UNA dirección
        // a la vez, como línea continua y gruesa (nunca ambas juntas).
        // ==================================================================
        const empresaCard = document.getElementById('empresaCard');
        const empresaCardNombre = document.getElementById('empresaCardNombre');
        const empresaCardRuta = document.getElementById('empresaCardRuta');
        const empresaCardDistancia = document.getElementById('empresaCardDistancia');
        const empresaCardCerrar = document.getElementById('empresaCardCerrar');
        const btnDireccionIda = document.getElementById('btnDireccionIda');
        const btnDireccionVuelta = document.getElementById('btnDireccionVuelta');

        let idRutaTarjetaActual = null; // qué empresa está mostrando la tarjeta ahora mismo

        function abrirTarjetaEmpresa(idRuta) {
            const datos = buscarRuta(idRuta);
            if (!datos) return;

            idRutaTarjetaActual = idRuta;
            empresaCardNombre.textContent = datos.nombre;
            empresaCardRuta.textContent = datos.ruta || '';

            // Refleja el estado actual (si ya había una dirección activa para esta empresa)
            btnDireccionIda.classList.toggle('activo', datos._direccionActiva === 'ida');
            btnDireccionVuelta.classList.toggle('activo', datos._direccionActiva === 'vuelta');
            actualizarDistanciaTarjeta(datos);

            // Cierra el menú lateral para dejar ver el mapa y la tarjeta
            cerrarMenu();
            empresaCard.classList.add('visible');
        }

        function cerrarTarjetaEmpresa() {
            empresaCard.classList.remove('visible');
            idRutaTarjetaActual = null;
        }

        empresaCardCerrar.addEventListener('click', cerrarTarjetaEmpresa);

        // ------------------------------------------------------------------
        // CÁMARA DIAGONAL: en vez de solo centrar la ruta (fitBounds sin rotar),
        // calculamos el rumbo (bearing) geográfico real de la ruta -de su
        // primer punto a su último- y rotamos la cámara para que esa línea
        // quede orientada en diagonal en la pantalla (no perfectamente
        // vertical ni horizontal), aprovechando mejor el espacio en móviles
        // (igual que se ve en la captura de referencia de Vura).
        // ------------------------------------------------------------------
        const DIAGONAL_OFFSET = 38; // grados de inclinación deseados respecto a la vertical de pantalla

        // Rumbo geográfico (0-360°, 0 = norte) entre dos puntos [lat, lng]
        function calcularBearing(lat1, lon1, lat2, lon2) {
            const toRad = d => d * Math.PI / 180;
            const toDeg = r => r * 180 / Math.PI;
            const dLon = toRad(lon2 - lon1);
            const y = Math.sin(dLon) * Math.cos(toRad(lat2));
            const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                      Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
            return (toDeg(Math.atan2(y, x)) + 360) % 360;
        }

        // Distancia total de una ruta ya trazada (fórmula de Haversine sobre las
        // coordenadas reales del trazado callejero, no la línea recta entre
        // waypoints -> el número refleja los km reales que recorre el vehículo).
        function calcularDistanciaKm(coords) {
            const R = 6371; // radio de la Tierra en km
            let total = 0;
            for (let i = 1; i < coords.length; i++) {
                const [lon1, lat1] = coords[i - 1];
                const [lon2, lat2] = coords[i];
                const toRad = d => d * Math.PI / 180;
                const dLat = toRad(lat2 - lat1);
                const dLon = toRad(lon2 - lon1);
                const a = Math.sin(dLat / 2) ** 2 +
                          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
                total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }
            return total;
        }

        // Muestra (o esconde) la longitud de la ruta en la tarjeta de empresa,
        // según la dirección activa en este momento para esa empresa.
        function actualizarDistanciaTarjeta(datos) {
            const cacheKey = datos._direccionActiva === 'ida' ? '_cacheIda'
                            : datos._direccionActiva === 'vuelta' ? '_cacheVuelta'
                            : null;
            const coords = cacheKey ? datos[cacheKey] : null;
            if (!coords) {
                empresaCardDistancia.textContent = '';
                return;
            }
            const km = calcularDistanciaKm(coords);
            const etiqueta = datos._direccionActiva === 'ida' ? 'Ida' : 'Vuelta';
            empresaCardDistancia.textContent = `📏 ${etiqueta}: ${km.toFixed(1)} km`;
        }

        async function seleccionarDireccion(sufijo) {
            if (!idRutaTarjetaActual) return;
            const idRuta = idRutaTarjetaActual;
            const datos = buscarRuta(idRuta);
            if (!datos) return;
            if (!datos.instancias) datos.instancias = [];

            const itemMenu = document.getElementById(`item-${idRuta}`);

            // Si ya estaba activa esa misma dirección, se desactiva (toggle off)
            if (datos._direccionActiva === sufijo) {
                limpiarInstancias(datos);
                datos._direccionActiva = null;
                btnDireccionIda.classList.remove('activo');
                btnDireccionVuelta.classList.remove('activo');
                if (itemMenu) itemMenu.classList.remove('activa');
                actualizarEstadoDistritos();
                actualizarDistanciaTarjeta(datos);
                return;
            }

            // Limpia cualquier dirección previamente dibujada de esta misma empresa
            limpiarInstancias(datos);

            const waypoints = sufijo === 'ida' ? datos.ida : datos.vuelta;
            await crearTramoGL(datos, idRuta, sufijo, waypoints);
            datos._direccionActiva = sufijo;

            btnDireccionIda.classList.toggle('activo', sufijo === 'ida');
            btnDireccionVuelta.classList.toggle('activo', sufijo === 'vuelta');
            if (itemMenu) itemMenu.classList.add('activa');
            actualizarEstadoDistritos();
            actualizarDistanciaTarjeta(datos);

            // Rumbo real de la ruta (de su primer punto a su último)
            const inicio = waypoints[0];
            const fin = waypoints[waypoints.length - 1];
            const rumboRuta = calcularBearing(inicio[0], inicio[1], fin[0], fin[1]);

            // Rotamos la cámara para que esa línea quede en diagonal (no vertical)
            const bearingCamara = (rumboRuta - DIAGONAL_OFFSET + 360) % 360;

            // Centra/ajusta el mapa automáticamente sobre la dirección elegida,
            // ya que puede estar en un departamento distinto al que se ve por
            // defecto (Lima/Callao), y aplica la rotación diagonal calculada.
            const bounds = waypoints.reduce(
                (b, p) => b.extend([p[1], p[0]]),
                new maplibregl.LngLatBounds([waypoints[0][1], waypoints[0][0]], [waypoints[0][1], waypoints[0][0]])
            );
            map.fitBounds(bounds, {
                padding: { top: 90, bottom: 220, left: 50, right: 50 },
                maxZoom: 14,
                duration: 1300,
                bearing: bearingCamara,
                pitch: 55
            });
        }

        btnDireccionIda.addEventListener('click', () => seleccionarDireccion('ida'));
        btnDireccionVuelta.addEventListener('click', () => seleccionarDireccion('vuelta'));

        // Ejecutar al cargar
        inicializarUI();

        // ==================================================================
        // MENÚ HAMBURGUESA (drawer) + GESTO DE DESLIZAR (swipe) EN MÓVILES
        // ==================================================================
        const panel = document.getElementById('controlPanel');
        const overlay = document.getElementById('overlay');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const edgeSwipeZone = document.getElementById('edgeSwipeZone');

        const PANEL_WIDTH = () => panel.getBoundingClientRect().width;

        function abrirMenu() {
            panel.classList.remove('dragging');
            panel.style.transform = '';
            panel.classList.add('open');
            overlay.classList.add('visible');
            hamburgerBtn.classList.add('active');
        }

        function cerrarMenu() {
            panel.classList.remove('dragging');
            panel.style.transform = '';
            panel.classList.remove('open');
            overlay.classList.remove('visible');
            hamburgerBtn.classList.remove('active');
        }

        function toggleMenu() {
            if (panel.classList.contains('open')) cerrarMenu();
            else abrirMenu();
        }

        hamburgerBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', cerrarMenu);

        // --- Gesto de arrastre (swipe) para abrir/cerrar el menú con el dedo ---
        let dragStartX = null;
        let dragCurrentX = null;
        let draggingFromEdge = false;
        let draggingFromPanel = false;

        function iniciarArrastre(x, desdeBorde) {
            dragStartX = x;
            dragCurrentX = x;
            draggingFromEdge = desdeBorde;
            draggingFromPanel = !desdeBorde;
            panel.classList.add('dragging');
        }

        function moverArrastre(x) {
            if (dragStartX === null) return;
            dragCurrentX = x;
            const deltaX = dragCurrentX - dragStartX;
            const ancho = PANEL_WIDTH();

            let offset;
            if (draggingFromEdge) {
                // Abriendo: arrastrando desde el borde derecho hacia la izquierda
                offset = Math.min(ancho, Math.max(0, -deltaX));
                panel.style.transform = `translateX(${ancho - offset}px)`;
            } else if (draggingFromPanel) {
                // Cerrando: arrastrando el panel abierto hacia la derecha
                offset = Math.min(ancho, Math.max(0, deltaX));
                panel.style.transform = `translateX(${offset}px)`;
            }

            if (offset > 10) overlay.classList.add('visible');
        }

        function terminarArrastre() {
            if (dragStartX === null) return;
            const deltaX = dragCurrentX - dragStartX;
            const ancho = PANEL_WIDTH();
            const umbral = ancho * 0.3;

            if (draggingFromEdge) {
                if (-deltaX > umbral) abrirMenu();
                else cerrarMenu();
            } else if (draggingFromPanel) {
                if (deltaX > umbral) cerrarMenu();
                else abrirMenu();
            }

            dragStartX = null;
            dragCurrentX = null;
            draggingFromEdge = false;
            draggingFromPanel = false;
        }

        // Touch: zona de borde derecho -> abre el menú al jalar hacia la izquierda
        edgeSwipeZone.addEventListener('touchstart', (e) => {
            iniciarArrastre(e.touches[0].clientX, true);
        }, { passive: true });

        // Touch: dentro del panel ya abierto -> cierra al jalar hacia la derecha
        panel.addEventListener('touchstart', (e) => {
            if (panel.classList.contains('open')) {
                iniciarArrastre(e.touches[0].clientX, false);
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (dragStartX !== null) moverArrastre(e.touches[0].clientX);
        }, { passive: true });

        document.addEventListener('touchend', terminarArrastre);
        document.addEventListener('touchcancel', terminarArrastre);

        // Mouse (para poder probar el arrastre también en escritorio)
        edgeSwipeZone.addEventListener('mousedown', (e) => iniciarArrastre(e.clientX, true));
        panel.addEventListener('mousedown', (e) => {
            if (panel.classList.contains('open')) iniciarArrastre(e.clientX, false);
        });
        document.addEventListener('mousemove', (e) => {
            if (dragStartX !== null) moverArrastre(e.clientX);
        });
        document.addEventListener('mouseup', terminarArrastre);
    </script>
</body>
</html>
